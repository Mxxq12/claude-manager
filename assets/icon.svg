<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a1f0a"/>
      <stop offset="100%" stop-color="#11111b"/>
    </linearGradient>
    <linearGradient id="mark" x1="140" y1="120" x2="380" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Abstract C shape -->
  <path d="M 310 148
           C 246 118, 168 138, 142 198
           C 116 258, 116 318, 142 370
           C 168 422, 246 440, 310 412"
        stroke="url(#mark)" stroke-width="48" stroke-linecap="round" fill="none"/>

  <!-- Three dots representing managed sessions -->
  <circle cx="340" cy="180" r="22" fill="#fbbf24" opacity="0.9"/>
  <circle cx="368" cy="260" r="22" fill="#f59e0b" opacity="0.7"/>
  <circle cx="340" cy="340" r="22" fill="#d97706" opacity="0.5"/>

  <!-- Connection lines -->
  <line x1="295" y1="168" x2="320" y2="178" stroke="#fbbf24" stroke-width="3" opacity="0.5"/>
  <line x1="310" y1="260" x2="346" y2="260" stroke="#f59e0b" stroke-width="3" opacity="0.4"/>
  <line x1="295" y1="352" x2="320" y2="342" stroke="#d97706" stroke-width="3" opacity="0.3"/>
</svg>
